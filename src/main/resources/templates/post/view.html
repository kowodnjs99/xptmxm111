<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{_layout/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<div layout:fragment="content" class="container mt-3">
    <!-- 본문 내용 시작 -->
    <h1>게시글 상세보기</h1>
    <div class="mb-3">
        <label for="nickname">작성자 :</label>
        <span class="form-control" id="nickname" th:text="${post?.writer?.nickname ?: '알 수 없음'}"></span>
    </div>
    <div class="mb-3">
        <label for="subject">제목 :</label>
        <span class="form-control" id="subject" th:text="${post.subject}"></span>
    </div>
    <div class="mb-3">
        <label for="content">내용 :</label>
        <span class="form-control" id="content" th:text="${post.content}"></span>
    </div>

    <br/>
    <div>
        <a th:href="@{'/post/sujung/' + ${post.id}}" class="btn btn-danger">수정</a>
        <a th:href="@{'/post/sakje/' + ${post.id}}" class="btn btn-danger">삭제</a>
        <a href="/post/list" class="btn btn-secondary">목록</a>
    </div>


    <br/>

    <h3 class="mt-4">댓글</h3>

    <form action="/post/comment/add" method="post" class="mt-3">
        <input type="hidden" name="postId" th:value="${post.id}">

        <textarea name="content" class="form-control" required></textarea>
        <button class="btn btn-primary mt-2">댓글 등록</button>
    </form>


    <div th:if="${#lists.isEmpty(postComment)}">
        <p>등록된 댓글이 없습니다.</p>
    </div>



    <!-- 댓글 리스트 -->
    <div id="comments">

        <div th:each="comment : ${PostComment}"
             th:style="'margin-left:' + (${comment.depth} * 30) + 'px'"
             class="mb-3">

            <!-- 댓글 내용 -->
            <div class="form-control">
                <p th:text="${comment.content}"></p>
                <small th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></small>

                <form th:action="@{/post/comment/delete/{id}(id=${comment.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-secondary">X</button>
                </form>

                <a th:onclick="'toggleEdit(' + ${comment.id} + ')'"
                   class="btn btn-sm btn-outline-secondary">수정</a>

            </div>

            <div th:id="'edit-form-' + ${comment.id}" style="display:none;">
                <form action="/post/comment/edit" method="post">
                    <input type="hidden" name="commentId" th:value="${comment.id}">
                    <input type="hidden" name="postId" th:value="${post.id}">

                    <textarea name="content"
                              class="form-control"
                              th:text="${comment.content}"
                              required></textarea>

                    <button class="btn btn-sm btn-primary mt-1">수정 완료</button>
                </form>
            </div>


            <!-- 대댓글 작성 폼 -->
            <form action="/post/comment/add" method="post" class="mt-2">
                <input type="hidden" name="postId" th:value="${post.id}">
                <input type="hidden" name="parentId" th:value="${comment.id}">

                <textarea name="content"
                          class="form-control"
                          placeholder="답글을 입력하세요"
                          required></textarea>

                <button class="btn btn-sm btn-secondary mt-1">답글</button>
            </form>

        </div>

    </div>

    <script>
        function showReplyForm(id) {
            const form = document.getElementById("reply-form-" + id);
            form.style.display =
                form.style.display === "none" ? "block" : "none";
        }
    </script>
    <script>
        function toggleEdit(id) {
            const form = document.getElementById('edit-form-' + id);
            form.style.display =
                (form.style.display === 'none') ? 'block' : 'none';
        }
    </script>

    <!-- 본문 내용 종료 -->
</div>
</html>
