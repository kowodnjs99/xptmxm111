<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout/layout}">

<div layout:fragment="content" class="container my-3">

    <!-- 본문 내용 시작 -->
    <h1>게시글 목록</h1>

    <!-- 🔍 자유 게시판 전용 검색바 -->
    <!-- 서브 검색바 -->
    <form th:action="@{/post/list}" method="get" class="d-flex mb-3">
        <input class="form-control me-2"
               type="search"
               name="keyword"
               placeholder="제목으로 검색"
               th:value="${keyword}">
        <button class="btn btn-search" type="submit">검색</button>
    </form>


    <!-- 게시글 리스트 -->
    <table class="table table-hover">
<!--        <table class="table">-->
        <thead>

        <tr>
            <th>ID</th>
            <th>제목</th>
            <th>조회수</th>
            <th>작성자</th>
            <th>등록일</th>
        </tr>

        </thead>
        <tbody>
        <tr th:each="post : ${page.content}">
            <td th:text="${post.id}"></td>
            <td>
                <a th:href="@{/post/view/{id}(id=${post.id})}"
                   th:text="${post.subject}"></a>
            </td>
            <td th:text="${post.viewCount}"></td>
            <td th:text="${post?.writer?.nickname ?: '알 수 없음'}"></td>
            <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"></td>
        </tr>
        <tr th:if="${page.totalElements == 0}">
            <td colspan="3" class="text-center text-muted py-3">게시글이 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <a href="/post/chuga" class="btn btn-primary">게시글 등록</a>

    <!-- 페이징 -->
    <nav th:if="${page.totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">

            <!-- 이전 -->
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/post/list(page=${page.number - 1}, keyword=${keyword})}">
                    이전
                </a>
            </li>

            <!-- 페이지 번호들 -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/post/list(page=${i}, keyword=${keyword})}">
                    1
                </a>
            </li>

            <!-- 다음 -->
            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/post/list(page=${page.number + 1}, keyword=${keyword})}">
                    다음
                </a>
            </li>

        </ul>
    </nav>

</div>

</html>
