<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{_layout/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<div layout:fragment="content" class="container mt-3">
    <!-- 본문 내용 시작 -->
    <h1>게시글 등록</h1>

    <form name="form">
        <div>
            <label>제목</label>
            <input type="text" name="subject" class="form-control">
        </div>

        <div>
            <label>내용</label>
            <textarea name="content" class="form-control"></textarea>
        </div>
    </form>
    <button id="btn-save" class="btn btn-secondary" type="button" onclick="save();">회원가입</button>
<script>
    function save() {
        if (confirm('등록할까요?')) {
            document.form.action = "/post/chugaProc";
            document.form.method = "post";
            document.form.submit();
        }
    }
</script>
<!-- 본문 내용 종료 -->
</div>
</html>
