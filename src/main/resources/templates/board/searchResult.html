<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout/layout}">

<th:block layout:fragment="content">

    <div class="container mt-4">
        <h2 th:text="'검색 결과 : ' + ${keyword}"></h2>

        <h4 class="mt-3">자유 게시판</h4>
        <ul>
            <li th:each="p : ${postPage.content}">
                <a th:href="@{/post/view/{id}(id=${p.id})}"
                   th:text="${p.subject}">제목</a>
            </li>
            <li th:if="${postPage.totalElements == 0}">
                검색 결과가 없습니다.
            </li>
        </ul>

        <h4 class="mt-4">영상 게시판</h4>
        <ul>
            <li th:each="v : ${videoPage.content}">
                <a th:href="@{/video/view/{id}(id=${v.id})}"
                   th:text="${v.title}">제목</a>
            </li>
            <li th:if="${videoPage.totalElements == 0}">
                검색 결과가 없습니다.
            </li>
        </ul>

        <!-- 통합 검색 페이징 (단순하게 postPage 기준으로 예시) -->
        <nav th:if="${postPage.totalPages > 1}" aria-label="Search page navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${postPage.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/board/search(page=${postPage.number - 1}, keyword=${keyword})}">
                        이전
                    </a>
                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, postPage.totalPages - 1)}"
                    th:classappend="${i == postPage.number} ? 'active'">
                    <a class="page-link"
                       th:text="${i + 1}"
                       th:href="@{/board/search(page=${i}, keyword=${keyword})}">
                        1
                    </a>
                </li>

                <li class="page-item" th:classappend="${postPage.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/board/search(page=${postPage.number + 1}, keyword=${keyword})}">
                        다음
                    </a>
                </li>
            </ul>
        </nav>

    </div>

</th:block>
</html>
