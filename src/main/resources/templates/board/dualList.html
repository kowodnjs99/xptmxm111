<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout/layout}">

<div layout:fragment="content" class="container mt-4">

    <!-- 🔹 메인 상단 전체 검색바 (네비바 검색과 같은 /search 사용) -->
<!--    <div class="row mb-4">-->
<!--        <div class="col-12">-->
<!--            <form class="d-flex" th:action="@{/search}" method="get">-->
<!--                <input class="form-control me-2"-->
<!--                       type="search"-->
<!--                       name="keyword"-->
<!--                       placeholder="게시판 전체 검색"-->
<!--                       th:value="${keyword}">-->
<!--                <button class="btn btn-search" type="submit">검색</button>-->
<!--            </form>-->
<!--        </div>-->
<!--    </div>-->

    <!-- 🔹 가운데 영역 : 왼쪽 로그인 박스 / 오른쪽 Board 메인 -->
    <div class="row mb-4">

        <!-- ⬅ 왼쪽 중단 : 로그인 박스 -->
        <div class="col-md-4 mb-3">
            <div class="card h-100">
                <div class="card-header">
                    로그인
                </div>
                <div class="card-body">
                    <!-- 비로그인 상태 -->
                    <div sec:authorize="isAnonymous()">
                        <p class="mb-3">
                            로그인 후 글 작성, 댓글 등 기능을 사용할 수 있습니다.
                        </p>
                        <a class="btn btn-success w-100" th:href="@{/member/login}">
                            로그인 하러 가기
                        </a>
                    </div>

                    <!-- 로그인 상태 -->
                    <div sec:authorize="isAuthenticated()">
                        <p class="mb-2">
                            <!-- MemberDetails 안에 member.nickname 이라고 가정 -->
                            <strong sec:authentication="principal.member.nickname">닉네임</strong> 님, 환영합니다.
                        </p>
                        <div class="d-flex gap-2">
                            <!-- 내 정보 페이지 (id 필요하면 이렇게) -->
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/member/view/{id}(id=${#authentication.principal.member.id})}">
                                내 정보
                            </a>
                            <a type="button"
                                    class="btn btn-outline-danger btn-sm"
                                    onclick="logout();"
                                    th:href="@{/member/logout}">
                                로그아웃
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ➡ 오른쪽 중단 : Board 메인 -->
        <div class="col-md-8 mb-3">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="mb-3">Board 메인</h2>
                    <p class="text-muted">
                        이 영역에는 나중에 공지, 배너, 소개글, 간단한 통계 같은 걸 넣으면 좋아.
                    </p>
                    <p>README 작성은 챗GPT를 이용했습니다.</p>
                    <p>학습용 프로젝트입니다.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔹 하단 : 왼쪽 자유 게시판 / 오른쪽 영상 게시판 -->
    <div class="row">

        <!-- ⬅ 왼쪽 하단 : 자유 게시판 -->
        <div class="col-md-6 mb-4">
            <div class="card h-100 ms-md-3">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>자유 게시판</span>
                    <a th:href="@{/post/list}" class="btn btn-sm btn-outline-secondary">더보기</a>
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0 table-hover">
                        <thead class="table-light">
                        <tr>
                            <th style="width: 60%">제목</th>
                            <th style="width: 20%">작성일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(postList)}">
                            <td colspan="3" class="text-center text-muted py-3">
                                등록된 게시글이 없습니다.
                            </td>
                        </tr>
                        <tr th:each="p : ${postList}">
                            <td>
                                <a th:href="@{/post/view/{id}(id=${p.id})}"
                                   th:text="${p.subject}">자유게시판 제목</a>
                            </td>
                            <td th:text="${p.createdAt != null ? #temporals.format(p.createdAt, 'yyyy-MM-dd') : ''}">
                                2025-01-01
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ➡ 오른쪽 하단 : 영상 게시판 -->
        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>영상 게시판</span>
                    <a th:href="@{/video/list}" class="btn btn-sm btn-outline-secondary">더보기</a>
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0 table-hover">
                        <thead class="table-light">
                        <tr>
                            <th style="width: 60%">제목</th>
                            <th style="width: 40%">등록일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(videoList)}">
                            <td colspan="2" class="text-center text-muted py-3">
                                등록된 영상이 없습니다.
                            </td>
                        </tr>
                        <tr th:each="v : ${videoList}">
                            <td>
                                <a th:href="@{/video/view/{id}(id=${v.id})}"
                                   th:text="${v.title}">영상 제목</a>
                            </td>
                            <td th:text="${v.createdAt != null ? #temporals.format(v.createdAt, 'yyyy-MM-dd') : ''}">
                                2025-01-01
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
    <!-- row 끝 -->

</div>
</html>
